<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>오크 클래식 아이템 사전</title>
<!-- updated: item cleanup + click search + static background + home button -->
<style>
  :root { --bg:#0b0806; --panel:#14110e; --line:#4a311c; --gold2:#b88b50; --text:#e8e0d3; --muted:#a99b88; }
  * { box-sizing:border-box; }
  html { min-height:100%; background:#0b0806; }
  body { margin:0; background:#0b0806; color:var(--text); font-family:"Noto Sans KR","Malgun Gothic",Arial,sans-serif; letter-spacing:-.2px; min-height:100vh; }
  body:before { content:""; position:fixed; inset:0; z-index:-1; pointer-events:none; background:radial-gradient(circle at 50% 0%, #1b1611 0, #0b0806 45%, #050403 100%); }
  .orc-dic { max-width:1180px; margin:0 auto; padding:42px 24px 70px; }

  .back-home { display:inline-flex; align-items:center; gap:7px; margin:0 0 14px; color:#c9b38f; font-size:13px; font-weight:700; line-height:1; text-decoration:none; border:1px solid rgba(184,139,80,.28); background:rgba(20,17,14,.68); padding:10px 13px; transition:background .16s ease,border-color .16s ease,color .16s ease,transform .16s ease; }
  .back-home:before { content:"←"; color:#b88b50; font-size:14px; }
  .back-home:hover { color:#fff0d0; border-color:rgba(184,139,80,.52); background:rgba(31,23,16,.82); transform:translateX(-1px); }
  .back-home:active { transform:translateX(-1px) translateY(1px); }
  .top { border:1px solid var(--line); background:linear-gradient(180deg,rgba(255,255,255,.025),rgba(0,0,0,.08)), radial-gradient(circle at 70% 0%,rgba(151,104,54,.12),transparent 34%), rgba(13,9,7,.82); padding:34px 36px 28px; margin-bottom:22px; }
  .title { display:flex; align-items:flex-end; justify-content:space-between; gap:16px; border-bottom:1px solid var(--line); padding-bottom:18px; margin-bottom:16px; }
  h1 { margin:0; color:#fff; font-size:32px; line-height:1.1; font-weight:800; text-shadow:0 0 12px rgba(217,180,122,.18); }
  .date { color:var(--muted); font-size:13px; }
  .desc { color:#cfc4b5; line-height:1.8; font-size:15px; }
  .toolbar { display:grid; grid-template-columns:1fr auto; gap:14px; margin:22px 0 18px; align-items:start; }
  .search-box { position:relative; display:grid; grid-template-columns:1fr 92px; gap:8px; }
  .search { width:100%; min-height:44px; border:1px solid var(--line); background:#100d0a; color:#fff; padding:0 14px; outline:none; font-size:15px; }
  .search:focus { border-color:var(--gold2); box-shadow:0 0 0 2px rgba(216,180,122,.12); }
  .search-btn { min-height:44px; border:1px solid var(--gold2); background:linear-gradient(180deg,#2a1c10,#17110b); color:#fff0d0; cursor:pointer; font-weight:800; }
  .search-btn:hover { filter:brightness(1.08); }
  .suggestions { position:absolute; left:0; right:100px; top:50px; z-index:20; border:1px solid var(--line); background:#100d0a; box-shadow:0 12px 24px rgba(0,0,0,.38); display:none; max-height:260px; overflow:auto; }
  .suggestions.show { display:block; }
  .suggestion-item { width:100%; display:flex; justify-content:space-between; gap:12px; border:0; border-bottom:1px solid rgba(216,180,122,.11); background:transparent; color:#e8e0d3; padding:11px 13px; cursor:pointer; text-align:left; font-size:14px; }
  .suggestion-item:last-child { border-bottom:0; }
  .suggestion-item:hover, .suggestion-item.active { background:rgba(184,139,80,.16); color:#fff6df; }
  .suggestion-name { font-weight:800; }
  .suggestion-type { color:#a99b88; font-size:12px; white-space:nowrap; }
  .suggestion-empty { padding:13px; color:#a99b88; font-size:14px; }
  .tabs { display:flex; flex-wrap:wrap; gap:8px; }
  .tab { border:1px solid var(--line); background:#110d09; color:#cbb99f; min-height:44px; padding:0 16px; cursor:pointer; font-weight:700; }
  .tab.active { border-color:var(--gold2); color:#fff0d0; background:linear-gradient(180deg,#2a1c10,#17110b); }
  .summary { color:var(--muted); font-size:13px; margin:4px 0 18px; }
  .grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:16px; }
  .card { border:1px solid var(--line); background:linear-gradient(180deg,rgba(255,255,255,.022),rgba(0,0,0,.06)), var(--panel); padding:18px; min-height:244px; position:relative; overflow:hidden; }
  .card:before { content:""; position:absolute; inset:0; pointer-events:none; border:1px solid rgba(216,180,122,.06); margin:4px; }
  .head { margin-bottom:14px; padding-bottom:12px; border-bottom:1px solid rgba(216,180,122,.12); }
  .enchant { color:#cfc9bf; font-size:13px; margin-bottom:6px; }
  .name { color:#fff6df; font-size:21px; font-weight:800; line-height:1.25; word-break:keep-all; }
  .flags { color:#968b7e; font-size:12px; margin-top:7px; }
  .section-title {
    background:rgba(184,139,80,.08);
    color:#e7d2ad;
    padding:10px 12px;
    font-size:14px;
    font-weight:800;
    margin:14px 0 12px;
    border-top:1px solid rgba(184,139,80,.20);
    border-bottom:1px solid rgba(184,139,80,.16);
    border-left:2px solid rgba(184,139,80,.55);
  }
  .info { display:grid; grid-template-columns:118px 1fr; row-gap:12px; column-gap:12px; padding:0 2px 12px; border-bottom:1px solid rgba(216,180,122,.12); font-size:14px; }
  .info .k { color:#b8aa98; } .info .v { color:#eee6d8; }
  .opts { display:grid; grid-template-columns:118px 1fr; gap:12px; padding:13px 2px 0; font-size:14px; }
  .opts .k { color:#b8aa98; }
  .opt-list { display:flex; flex-direction:column; gap:8px; color:#fff; }
  .empty { color:#8e8375; }
  .badge { display:inline-flex; align-items:center; color:#e5c18a; border:1px solid rgba(216,180,122,.25); padding:3px 7px; font-size:12px; margin-right:6px; vertical-align:middle; font-weight:700; }
  .no-result { border:1px solid var(--line); padding:50px 20px; text-align:center; color:var(--muted); display:none; }
  .foot { color:#7f7467; text-align:center; font-size:13px; margin-top:26px; }
  @media (max-width:860px) { .orc-dic{padding:26px 12px 50px;} .top{padding:24px 18px;} .title{display:block;} h1{font-size:27px;margin-bottom:12px;} .toolbar{grid-template-columns:1fr;} .search-box{grid-template-columns:1fr 74px;} .suggestions{right:82px;} .grid{grid-template-columns:1fr;} .card{padding:14px;} .info,.opts{grid-template-columns:92px 1fr;} }
</style>
</head>

nfo":[["종류","마법인형"],["무게","1"],["재질","나무"],["거래","가능"],["창고","가능"]],"options":["SP+10","마법 명중+10","스턴 내성+10","64초당 MP 회복+30","경험치 보너스+30%","10%확률로 마법 공격"]},{"id":1385,"name":"마법인형: 마법확률 각성 안타라스","category":"마법인형","subtype":"마법인형","flags":{"창고":true,"드랍":true,"교환":true},"raw_type1":"item","raw_type2":"마법인형","info":[["종류","마법인형"],["무게","1"],["재질","나무"],["거래","가능"],["창고","가능"]],"options":["스턴 내성+10","대미지 감소+10","경험치 보너스+50%","64초당 MP 회복+20","10%확률로 마법 공격"]}];
const CATS = ["전체","무기","방어구","악세서리","마법인형"];
let currentCat = "전체";
let appliedQuery = "";
let activeSuggestionIndex = -1;

const searchInput = document.getElementById("search");
const searchBtn = document.getElementById("searchBtn");
const suggestionBox = document.getElementById("suggestions");

function flagText(flags) { return `창고${flags.창고 ? "O" : "X"}  드롭${flags.드랍 ? "O" : "X"}  교환${flags.교환 ? "O" : "X"}`; }
function esc(s) { return String(s ?? "").replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m])); }
function normalize(s) { return String(s ?? "").trim().toLowerCase(); }
function catItems() { return ITEMS.filter(i => currentCat === "전체" || i.category === currentCat); }
function matchesQuery(item, q) {
  if (!q) return true;
  return normalize(item.name).includes(q) || normalize(item.subtype).includes(q) || normalize(item.category).includes(q);
}
function getSuggestions(q) {
  if (!q) return [];
  const list = catItems().filter(i => matchesQuery(i, q));
  list.sort((a, b) => {
    const an = normalize(a.name), bn = normalize(b.name);
    const aStart = an.startsWith(q) ? 0 : 1;
    const bStart = bn.startsWith(q) ? 0 : 1;
    if (aStart !== bStart) return aStart - bStart;
    return an.localeCompare(bn, "ko");
  });
  return list.slice(0, 12);
}
function hideSuggestions() {
  suggestionBox.classList.remove("show");
  activeSuggestionIndex = -1;
}
function renderSuggestions() {
  const q = normalize(searchInput.value);
  activeSuggestionIndex = -1;
  if (!q) {
    hideSuggestions();
    suggestionBox.innerHTML = "";
    return;
  }
  const list = getSuggestions(q);
  if (!list.length) {
    suggestionBox.innerHTML = `<div class="suggestion-empty">일치하는 결과가 없습니다.</div>`;
    suggestionBox.classList.add("show");
    return;
  }
  suggestionBox.innerHTML = list.map((i, idx) => `<button type="button" class="suggestion-item" data-index="${idx}" data-name="${esc(i.name)}"><span class="suggestion-name">${esc(i.name)}</span><span class="suggestion-type">${esc(i.category)} · ${esc(i.subtype)}</span></button>`).join("");
  suggestionBox.classList.add("show");
  suggestionBox.querySelectorAll(".suggestion-item").forEach(btn => {
    btn.addEventListener("mousedown", e => e.preventDefault());
    btn.addEventListener("click", () => {
      searchInput.value = btn.dataset.name;
      applySearch(btn.dataset.name);
    });
  });
}
function moveSuggestion(step) {
  const buttons = Array.from(suggestionBox.querySelectorAll(".suggestion-item"));
  if (!buttons.length) return;
  activeSuggestionIndex = (activeSuggestionIndex + step + buttons.length) % buttons.length;
  buttons.forEach((btn, idx) => btn.classList.toggle("active", idx === activeSuggestionIndex));
  buttons[activeSuggestionIndex].scrollIntoView({ block:"nearest" });
}
function applySearch(value) {
  appliedQuery = normalize(value ?? searchInput.value);
  hideSuggestions();
  render();
}
function renderTabs() {
  const el=document.getElementById("tabs");
  el.innerHTML=CATS.map(cat => { const count=cat==="전체" ? ITEMS.length : ITEMS.filter(i=>i.category===cat).length; return `<button class="tab ${cat===currentCat?'active':''}" data-cat="${cat}">${cat} <span class="badge">${count}</span></button>`; }).join("");
  el.querySelectorAll(".tab").forEach(btn => btn.onclick=()=>{ currentCat=btn.dataset.cat; hideSuggestions(); renderSuggestions(); render(); });
}
function render() {
  renderTabs();
  const list=catItems().filter(i => matchesQuery(i, appliedQuery));
  const label = appliedQuery ? `검색결과 ${list.length}건` : `총 ${list.length}개 아이템 표시 중`;
  document.getElementById("summary").textContent=label;
  const grid=document.getElementById("grid");
  grid.innerHTML=list.map(i => `<article class="card">
    <div class="head">
      <div class="enchant">${i.category!=="마법인형"?"+0 ":""}<span class="badge">${esc(i.category)}</span>${i.category!=="마법인형" && i.subtype && i.subtype!==i.category ? `<span class="badge">${esc(i.subtype)}</span>` : ""}</div>
      <div class="name">${esc(i.name)}</div>
      <div class="flags">${flagText(i.flags)}</div>
    </div>
    <div class="section-title">아이템 정보</div>
    <div class="info">${i.info.map(row => `<div class="k">${esc(row[0])}</div><div class="v">${esc(row[1])}</div>`).join("")}</div>
    <div class="opts"><div class="k">옵션</div><div class="opt-list">${i.options.length ? i.options.map(o => `<div>${esc(o)}</div>`).join("") : `<div class="empty">옵션 없음</div>`}</div></div>
  </article>`).join("");
  document.getElementById("noResult").textContent = appliedQuery ? "일치하는 결과가 없습니다." : "검색 결과가 없습니다.";
  document.getElementById("noResult").style.display=list.length ? "none" : "block";
}

searchInput.addEventListener("input", renderSuggestions);
searchInput.addEventListener("keydown", e => {
  if (e.key === "ArrowDown") { e.preventDefault(); moveSuggestion(1); }
  else if (e.key === "ArrowUp") { e.preventDefault(); moveSuggestion(-1); }
  else if (e.key === "Enter") {
    e.preventDefault();
    const active = suggestionBox.querySelector(".suggestion-item.active");
    if (active) {
      searchInput.value = active.dataset.name;
      applySearch(active.dataset.name);
    } else {
      applySearch();
    }
  } else if (e.key === "Escape") {
    hideSuggestions();
  }
});
searchInput.addEventListener("focus", renderSuggestions);
searchInput.addEventListener("blur", () => setTimeout(hideSuggestions, 120));
searchBtn.addEventListener("click", () => applySearch());

render();
</script>
